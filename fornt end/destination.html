<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Destination</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/destination.css">

</head>

<body>

<!-- HERO -->
<section class="hero-banner">
    <button class="back-btn" onclick="history.back()">
        ← Back
    </button>


    <img id="heroImage" class="hero-image">

    <div class="hero-overlay">
        

        <div class="container">

            <div class="hero-content">

                <span class="badge bg-warning text-dark mb-3">
                     4.9 Rating
                </span>

                <h1 id="title"></h1>

                <h4 id="subtitle"></h4>

                <p id="about"></p>

                <div class="mt-4">

                    <button
                    class="btn btn-warning btn-lg me-3"
                    onclick="scrollPlaces()">
                    
                    Book Now
                    
                    </button>

                    <button
                    class="btn btn-outline-light btn-lg"
                    onclick="addWishlist()">
                    
                    Add Wishlist
                    
                    </button>

                </div>

            </div>

        </div>

    </div>

</section>



    <hr class="my-5">

    <h2
    id="placesSection"
    class="section-title">
    
    Places
    
    </h2>
    <div id="places"
         class="row g-4">
    </div>
    <h2 class="section-title">
        Recommended Hotels
    </h2>
    
    <div id="hotels" class="row g-4"></div>
    <hr class="my-5">

<h2 class="section-title">
Transport
</h2>

<div id="transport" class="row g-4"></div>
</section>
<section class="container py-5">

    <div class="row justify-content-center">
    
    <div class="col-lg-10">
    </div>

</div>

</section>

    <h2 class="section-title">
    
        Your Trip
    
    </h2>
    
    <div class="card shadow-lg p-4 rounded-4">
    
    <h5>Selected Places</h5>
    
    <div id="tripPlaces"></div>
    
    <hr>
    
    <h4>
    
    Total :
    
    ₹<span id="tripTotal">0</span>
    
    </h4>
    
    <button
    id="completeTripBtn"
    class="btn btn-warning btn-lg w-100 mt-3"
    onclick="goToTripSummary()"
    disabled>

    Book Complete Trip

</button>
    
    </div>
    
    </section>

    <!-- Hotel Booking Modal -->

<div class="modal fade" id="hotelModal">

    <div class="modal-dialog modal-dialog-centered">
    
    <div class="modal-content rounded-4 shadow-lg border-0">
    
    <div class="modal-header">
    
    <h4 class="modal-title">
    
     Book Hotel
    
    </h4>
    
    <button class="btn-close" data-bs-dismiss="modal"></button>
    
    </div>
    
    <div class="modal-body">
    
    <h5 id="hotelName"></h5>
    
    <div class="mb-3">
    
    <label>Check In</label>
    
    <input type="date"
    id="checkIn"
    class="form-control">
    
    </div>
    
    <div class="mb-3">
    
    <label>Check Out</label>
    
    <input type="date"
    id="checkOut"
    class="form-control">
    
    </div>
    
    <div class="mb-3">
    
    <label>Guests</label>
    
    <select id="guests"
    class="form-select">
    
    <option>1</option>
    
    <option>2</option>
    
    <option>3</option>
    
    <option>4</option>
    
    <option>5</option>
    
    </select>
    
    </div>
    
    <div class="mb-3">
    
    <label>Rooms</label>
    
    <select id="rooms"
    class="form-select">
    
    <option>1</option>
    
    <option>2</option>
    
    <option>3</option>
    
    <option>4</option>
    
    </select>
    
    </div>
    
    <hr>
    
    <h5>
    
    Price / Night :
    
    <span id="nightPrice"
    class="text-success fw-bold"></span>
    
    </h5>
    
    <h5>
    
    Total :
    
    <span id="hotelTotal"
    class="text-success fw-bold">
    
    ₹0
    
    </span>
    
    </h5>
    
    </div>
    
    <div class="modal-footer">
    
        <button
        id="confirmHotelBtn"
        class="btn btn-warning w-100 btn-lg"
        onclick="confirmHotelBooking()"
        disabled>
        
        Confirm Booking
        
        </button>
    
    </div>
    
    </div>
    
    </div>
    
    </div>
    <!-- Place Booking Modal -->

<div class="modal fade" id="placeModal">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content rounded-4 shadow-lg border-0">

            <div class="modal-header border-0">

                <h3 class="modal-title">

                    Book Attraction

                </h3>

                <button class="btn-close"
                    data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                <h4 id="placeName"></h4>

                <label class="mt-3">

                    Visit Date

                </label>

                <input
                    type="date"
                    class="form-control rounded-4"
                    id="visitDate">

                <label class="mt-3">

                    Tickets

                </label>

                <div class="d-flex align-items-center">

                    <button
                        class="btn btn-outline-warning"
                        onclick="changeTickets(-1)">

                        -

                    </button>

                    <input
                        id="ticketCount"
                        class="form-control mx-2 text-center"
                        value="1"
                        readonly>

                    <button
                        class="btn btn-outline-warning"
                        onclick="changeTickets(1)">

                        +

                    </button>

                </div>

                <hr>

                <h5>

                    Price / Ticket :

                    <span
                        id="ticketPrice"
                        class="text-success fw-bold">

                    </span>

                </h5>

                <h4>

                    Total :

                    <span
                        id="placeTotal"
                        class="text-success fw-bold">

                        ₹0

                    </span>

                </h4>

            </div>

            <div class="modal-footer border-0">

                <button
    id="confirmPlaceBtn"
    class="btn btn-warning w-100 btn-lg"
    onclick="confirmPlaceBooking()">

    Confirm

</button>

            </div>

        </div>

    </div>

</div>
    <!-- Transport Booking Modal -->

<div class="modal fade" id="transportModal">

    <div class="modal-dialog modal-dialog-centered">
    
    <div class="modal-content rounded-4">
    
    <div class="modal-header border-0">
    
    <h2> Book Transport</h2>
    
    <button class="btn-close"
    data-bs-dismiss="modal"></button>
    
    </div>
    
    <div class="modal-body">
    
    <h4 id="transportName"></h4>
    
    <label class="mt-2">Pickup Date</label>
    
    <input
    type="date"
    class="form-control rounded-4"
    id="pickupDate">
    
    <label class="mt-3">Return Date</label>
    
    <input
    type="date"
    class="form-control rounded-4"
    id="returnDate">
    
    <label class="mt-3">Passengers</label>
    
    <select
    class="form-select rounded-4"
    id="passengers">    
    <option>1</option>
    <option>2</option>
    <option>3</option>
    <option>4</option>
    <option>5</option>
    <option>6</option>
    
    </select>
    
    <hr>
    
    <h4>
    
    Price / Day :
    
    <span class="text-success"
    id="transportPrice"></span>
    
    </h4>
    
    <h3>
    
    Total :
    
    <span class="text-success"
    id="transportTotal">
    
    ₹0
    
    </span>
    
    </h3>
    
    <button
    id="confirmTransportBtn"
    class="btn btn-warning w-100 btn-lg"
    onclick="confirmTransportBooking()"
    disabled>
    
    Reserve Vehicle
    
    </button>
    
    </div>
    
    </div>
    
    </div>
    
    </div>

<script src="js/destinations.js"></script>
<script src="js/destination.js"></script>
<script src="js/trip.js"></script>
<script src="js/darkmode.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
