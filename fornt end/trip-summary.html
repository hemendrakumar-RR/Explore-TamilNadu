<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Trip Summary</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="css/style.css">

<style>

body{

background:#f6f8fb;

}

.summary-card{

border-radius:25px;

border:none;

box-shadow:0 15px 40px rgba(0,0,0,.12);

}

.section{

padding:20px;

border-bottom:1px solid #eee;

}

.price{

font-weight:bold;

color:#f4b400;

}

.total{

font-size:28px;

font-weight:bold;

color:#198754;

}

</style>

</head>

<body>

    <div class="container py-5">

    
    
        <div class="card summary-card">
    
            <div class="card-body p-5">

                <div class="d-flex justify-content-between align-items-center mb-4">
                
                    <h2 class="mb-0">
                        Trip Summary
                    </h2>
                
                    <button class="back-btn" onclick="history.back()">
                        ← Back
                    </button>
                
                </div>

<div id="summaryContainer">

Loading...

</div>

<hr>

<div class="d-flex justify-content-between">

<h4>GST (5%)</h4>

<h4 id="gst"></h4>

</div>

<div class="d-flex justify-content-between">

<h4>Service Fee</h4>

<h4>₹150</h4>

</div>

<hr>

<div class="d-flex justify-content-between">

<h2>Grand Total</h2>

<h2 class="total"
id="grandTotal">

₹0

</h2>

</div>

<button
    class="btn btn-warning btn-lg w-100 mt-4"
    onclick="goPayment()">
    Proceed to Payment
</button>
</div>

</div>

</div>

<script src="js/trip-summary.js"></script>
<script src="js/darkmode.js"></script>


</body>

</html>
